<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - STK Digital Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); }
        
        select {
            color: black !important;
            background-color: white !important;
        }
    </style>
</head>
<body class="bg-[#0a0a0f] text-white">
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-2xl font-black title-font">STK</div>
                <div class="title-font text-3xl font-semibold tracking-tighter">STK DIGITAL</div>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-indigo-400">Home</a>
                <a href="services.html" class="hover:text-indigo-400">Services</a>
                <a href="portfolio.html" class="hover:text-indigo-400">Portfolio</a>
                <a href="about.html" class="hover:text-indigo-400">About</a>
                <a href="contact.html" class="text-indigo-400">Contact</a>
            </div>
            <a href="contact.html" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-3xl font-semibold">Order Now</a>
        </div>
    </nav>

    <div class="pt-24 max-w-2xl mx-auto px-8 py-20">
        <h1 class="title-font text-5xl font-bold text-center mb-8">Start Your Project</h1>
        
        <form action="https://formspree.io/f/xdarbvko" method="POST" class="glass rounded-3xl p-10 space-y-8">
            <input type="text" name="name" placeholder="Your Name" required class="w-full bg-white/5 border border-white/20 rounded-2xl px-6 py-5">
            <input type="email" name="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/20 rounded-2xl px-6 py-5">
            <input type="text" name="discord" placeholder="Discord Username" class="w-full bg-white/5 border border-white/20 rounded-2xl px-6 py-5">

            <div>
                <label class="block text-sm mb-2 text-gray-400">What do you want?</label>
                <select id="service" class="w-full border border-white/20 rounded-2xl px-6 py-5 text-black">
                    <option value="0">Select Service</option>
                    <option value="10">Logo - $10</option>
                    <option value="20">Stream Banner - $20</option>
                    <option value="35">Discord Server Setup - $25</option>
                    <option value="25">Alerts / Notifications - $25</option>
                    <option value="35">YouTube Thumbnail - $35</option>
                    <option value="45">Social Media Overlay - $45</option>
                    <option value="49">Twitch/Kick Overlay - $49</option>
                    <option value="79">Full Stream Pack - $79</option>
                    <option value="99">Complete Brand Kit - $99</option>
                    <option value="0">Custom Request</option>
                </select>
            </div>

            <div>
                <label class="block text-sm mb-3 text-gray-400">Optional Tip</label>
                <div class="flex gap-3">
                    <button type="button" onclick="addTip(15)" class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">15%</button>
                    <button type="button" onclick="addTip(20)" class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">20%</button>
                    <button type="button" onclick="addTip(25)" class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">25%</button>
                </div>
                <input type="number" id="customTip" placeholder="Custom tip %" class="mt-3 w-full bg-white/5 border border-white/20 rounded-2xl px-6 py-5 text-white" oninput="updateTotal()">
            </div>

            <div id="totalDisplay" class="text-4xl font-bold text-indigo-400 text-center py-6 border border-white/10 rounded-3xl">
                Total: $0.00
            </div>

            <textarea name="description" rows="6" placeholder="More details, references, colors..." class="w-full bg-white/5 border border-white/20 rounded-3xl px-6 py-5"></textarea>
            
            <button type="submit" class="w-full py-6 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-3xl font-bold text-lg">
                Submit Order Request
            </button>
        </form>
    </div>

    <script>
        let basePrice = 0;
        const serviceSelect = document.getElementById('service');
        const totalDisplay = document.getElementById('totalDisplay');

        serviceSelect.addEventListener('change', () => {
            basePrice = parseFloat(serviceSelect.value) || 0;
            updateTotal();
        });

        function addTip(percent) {
            document.getElementById('customTip').value = percent;
            updateTotal();
        }

        function updateTotal() {
            const tipPercent = parseFloat(document.getElementById('customTip').value) || 0;
            const tipAmount = basePrice * (tipPercent / 100);
            const total = basePrice + tipAmount;
            totalDisplay.textContent = `Total: $${total.toFixed(2)}`;
        }
    </script>

    <footer class="bg-black py-12 text-center text-sm text-gray-500"> © 2026 STK Digital Design</footer>
</body>
</html>
